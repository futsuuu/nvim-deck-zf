name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test-zig:
    strategy:
      matrix:
        target:
          - x86-linux-musl
          - x86_64-linux-gnu
          - x86_64-windows-msvc
          - aarch64-macos
        include:
          - target: x86-linux-musl
            os: ubuntu-latest
          - target: x86_64-linux-gnu
            os: ubuntu-latest
          - target: x86_64-windows-msvc
            os: windows-latest
          - target: aarch64-macos
            os: macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
      - uses: mlugg/setup-zig@v2
      - run: zig build test -Dtarget=${{ matrix.target }}
